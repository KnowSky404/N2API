name: CI Image

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      N2API_TEST_RUN_ID: gha-test-${{ github.run_id }}-${{ github.run_attempt }}
      MOCK_PROJECT: n2api-e2e-mock-${{ github.run_id }}-${{ github.run_attempt }}
    services:
      postgres:
        image: postgres:18.4-alpine3.23@sha256:996d0920e4ff9df1fc19dacb904492f3c1ec0ec1cc338f0ad7123be7731c5f5e
        env:
          POSTGRES_DB: n2api_store_test
          POSTGRES_USER: n2api
          POSTGRES_PASSWORD: ci-store-test-password
        options: >-
          --health-cmd "pg_isready -U n2api -d n2api_store_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Verify pinned build dependencies
        run: dev/ci/verify-pinned-dependencies.sh

      - name: Test development artifact lifecycle
        run: make test-dev-artifacts

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Preflight PostgreSQL
        shell: bash
        run: |
          set -euo pipefail
          docker exec "${{ job.services.postgres.id }}" pg_isready -U n2api -d n2api_store_test
          timeout 10 bash -c \
            'until (exec 3<>/dev/tcp/127.0.0.1/5432) 2>/dev/null; do sleep 1; done'

      - name: Test backend
        working-directory: backend
        env:
          N2API_STORE_TEST_DATABASE_URL: postgres://n2api:ci-store-test-password@127.0.0.1:5432/n2api_store_test?sslmode=disable
          N2API_STORE_TEST_ALLOW_DESTRUCTIVE: "1"
        shell: bash
        run: |
          set -euo pipefail
          test -n "${N2API_STORE_TEST_DATABASE_URL:-}"
          go test -count=1 ./...

      - name: Start mock OpenAI upstream
        id: mock_start
        shell: bash
        run: |
          set -euo pipefail
          make disk-check-heavy
          raw_dir="$RUNNER_TEMP/n2api-diagnostics/mock-smoke/raw"
          mkdir -p "$raw_dir"
          if ! docker compose --project-name "$MOCK_PROJECT" \
            -f deploy/compose.e2e.yaml up -d --build --wait mock-openai \
            >"$raw_dir/compose-up.log" 2>&1; then
            printf 'stage=compose_start failure=command_failed status=1\n' \
              >"$raw_dir/mock-smoke.log"
            exit 1
          fi

      - name: Smoke test mock OpenAI scenarios
        id: mock_smoke
        shell: bash
        run: |
          set -euo pipefail
          raw_dir="$RUNNER_TEMP/n2api-diagnostics/mock-smoke/raw"
          mkdir -p "$raw_dir"
          if ! docker compose --project-name "$MOCK_PROJECT" \
            -f deploy/compose.e2e.yaml exec -T mock-openai sh -eu \
            >"$raw_dir/mock-smoke.log" 2>&1 <<'MOCK_SMOKE'
              base=http://mock-openai:8080
              authorization="Authorization: Bearer e2e-upstream-fixture-key"
              response=$(curl -fsS "$base/healthz")
              printf '%s\n' "$response" | grep -q '"status":"ok"'
              actual=$(curl -sS -o /dev/null -w "%{http_code}" "$base/v1/models")
              test "$actual" = 401
              response=$(curl -fsS -H "$authorization" "$base/v1/models")
              printf '%s\n' "$response" | grep -q '"object":"list"'
              response=$(curl -fsS -H "$authorization" -H "Content-Type: application/json" \
                -d '{"model":"gpt-5"}' "$base/v1/chat/completions")
              printf '%s\n' "$response" | grep -q '"total_tokens":25'
              response=$(curl -fsS -N -H "$authorization" -H "Content-Type: application/json" \
                -d '{"model":"gpt-5","stream":true}' "$base/v1/responses")
              printf '%s\n' "$response" | grep -q "response.completed"

              for pair in status-401:401 status-403:403 status-429:429 status-500:500 status-503:503; do
                scenario=${pair%:*}
                expected=${pair#*:}
                actual=$(curl -sS -o /dev/null -w "%{http_code}" \
                  -H "$authorization" \
                  -H "Content-Type: application/json" \
                  -H "X-N2API-E2E-Scenario: $scenario" \
                  -d '{"model":"gpt-5"}' "$base/v1/responses")
                test "$actual" = "$expected"
              done

              for scenario in missing-content-type wrong-content-type missing-usage malformed-usage; do
                curl -fsS -o /dev/null -H "$authorization" -H "Content-Type: application/json" \
                  -H "X-N2API-E2E-Scenario: $scenario" \
                  -d '{"model":"gpt-5"}' "$base/v1/responses"
              done

              for scenario in timeout-before-headers disconnect-before-headers disconnect-after-first-event; do
                if curl -sS --max-time 1 -o /dev/null \
                  -H "$authorization" \
                  -H "Content-Type: application/json" \
                  -H "X-N2API-E2E-Scenario: $scenario" \
                  -d '{"model":"gpt-5","stream":true}' "$base/v1/responses"; then
                  echo "scenario $scenario unexpectedly completed" >&2
                  exit 1
                fi
              done

              state=$(curl -fsS "$base/__mock/state")
              for scenario in happy status-401 status-403 status-429 status-500 status-503 \
                missing-content-type wrong-content-type missing-usage malformed-usage \
                timeout-before-headers disconnect-before-headers disconnect-after-first-event; do
                printf '%s\n' "$state" | grep -q "\"scenario\":\"$scenario\""
              done
          MOCK_SMOKE
          then
            printf 'stage=mock_smoke failure=command_failed status=1\n' \
              >>"$raw_dir/mock-smoke.log"
            exit 1
          fi

      - name: Collect sanitized mock diagnostics
        id: mock_diagnostics
        if: >-
          failure() &&
          (steps.mock_start.outcome == 'failure' || steps.mock_smoke.outcome == 'failure')
        continue-on-error: true
        timeout-minutes: 3
        shell: bash
        run: |
          set -euo pipefail
          raw_dir="$RUNNER_TEMP/n2api-diagnostics/mock-smoke/raw"
          safe_dir="$RUNNER_TEMP/n2api-diagnostics/mock-smoke/safe"
          dev/ci/collect-e2e-diagnostics.sh \
            "$MOCK_PROJECT" mock-smoke "$raw_dir" "$safe_dir"
          test -f "$safe_dir/safe.marker"
          echo "safe=true" >> "$GITHUB_OUTPUT"

      - name: Upload sanitized mock diagnostics
        if: always() && steps.mock_diagnostics.outputs.safe == 'true'
        timeout-minutes: 3
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-diagnostics-mock-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/n2api-diagnostics/mock-smoke/safe
          if-no-files-found: error
          retention-days: 3
          include-hidden-files: false
          compression-level: 9

      - name: Stop mock OpenAI upstream
        if: always()
        timeout-minutes: 2
        run: >-
          docker compose --project-name "$MOCK_PROJECT"
          -f deploy/compose.e2e.yaml
          down --volumes --remove-orphans --rmi local --timeout 10

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Check frontend
        working-directory: frontend
        run: bun run check

      - name: Test frontend
        working-directory: frontend
        run: bun test

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      - name: Run PostgreSQL-backed gateway E2E
        id: gateway_e2e
        env:
          E2E_PROJECT: n2api-gateway-e2e-${{ github.run_id }}-${{ github.run_attempt }}
        shell: bash
        run: |
          set -euo pipefail
          make disk-check-heavy
          raw_dir="$RUNNER_TEMP/n2api-diagnostics/gateway/raw"
          mkdir -p "$raw_dir"
          if ! docker compose --project-name "$E2E_PROJECT" \
            -f deploy/compose.e2e.yaml \
            build gateway-e2e >"$raw_dir/compose-build.log" 2>&1; then
            printf 'stage=compose_build failure=command_failed status=1\n' \
              >"$raw_dir/gateway-e2e.log"
            exit 1
          fi
          if ! docker compose --project-name "$E2E_PROJECT" \
            -f deploy/compose.e2e.yaml \
            up -d --build --wait postgres mock-openai n2api \
            >"$raw_dir/compose-up.log" 2>&1; then
            printf 'stage=compose_start failure=command_failed status=1\n' \
              >"$raw_dir/gateway-e2e.log"
            exit 1
          fi
          n2api_container="$(docker compose --project-name "$E2E_PROJECT" \
            -f deploy/compose.e2e.yaml ps -q n2api)"
          test -n "$n2api_container"
          test "$(docker inspect -f '{{.HostConfig.ReadonlyRootfs}}' "$n2api_container")" = "true"
          test "$(docker inspect -f '{{.HostConfig.SecurityOpt}}' "$n2api_container")" = "[no-new-privileges:true]"
          test "$(docker inspect -f '{{.HostConfig.CapDrop}}' "$n2api_container")" = "[ALL]"
          test "$(docker inspect -f '{{.Config.StopTimeout}}' "$n2api_container")" = "10"
          tmpfs_options="$(docker inspect -f '{{index .HostConfig.Tmpfs "/tmp"}}' "$n2api_container")"
          for option in rw noexec nosuid nodev size=16m mode=1777 uid=10001 gid=10001; do
            case ",$tmpfs_options," in
              *",$option,"*) ;;
              *) echo "N2API /tmp is missing $option" >&2; exit 1 ;;
            esac
          done
          test "$(docker exec "$n2api_container" stat -c '%u:%g %a' /tmp)" = "10001:10001 1777"
          test "$(docker exec "$n2api_container" df -k /tmp | awk 'NR == 2 { print $2 }')" = "16384"
          mount_options="$(docker exec "$n2api_container" awk '$2 == "/tmp" { print $4 }' /proc/mounts)"
          for option in rw noexec nosuid nodev; do
            case ",$mount_options," in
              *",$option,"*) ;;
              *) echo "N2API /tmp mount is missing $option" >&2; exit 1 ;;
            esac
          done
          if docker exec --user 0 "$n2api_container" touch /rootfs-write-probe 2>/dev/null; then
            echo "N2API root filesystem unexpectedly accepted a write" >&2
            exit 1
          fi
          docker exec "$n2api_container" sh -c \
            "printf '#!/bin/sh\nexit 0\n' > /tmp/n2api-exec-probe && chmod 700 /tmp/n2api-exec-probe"
          if docker exec "$n2api_container" /tmp/n2api-exec-probe 2>/dev/null; then
            echo "N2API /tmp unexpectedly allowed execution" >&2
            exit 1
          fi
          docker exec "$n2api_container" rm /tmp/n2api-exec-probe
          gateway_status=0
          docker compose --project-name "$E2E_PROJECT" \
            -f deploy/compose.e2e.yaml \
            run --rm --no-deps \
            -e N2API_E2E_PRESERVE_FAILURE_STATE=true \
            -e N2API_E2E_DIAGNOSTIC_DRILL="${N2API_E2E_DIAGNOSTIC_DRILL:-}" \
            -e N2API_E2E_DIAGNOSTIC_SECRET_CANARY="${N2API_E2E_DIAGNOSTIC_SECRET_CANARY:-}" \
            -e N2API_E2E_DIAGNOSTIC_BODY_CANARY="${N2API_E2E_DIAGNOSTIC_BODY_CANARY:-}" \
            gateway-e2e >"$raw_dir/gateway-e2e.log" 2>&1 || gateway_status=$?
          if (( gateway_status != 0 )); then
            printf 'stage=gateway_test failure=command_failed status=%d\n' \
              "$gateway_status" >>"$raw_dir/gateway-e2e.log"
            exit "$gateway_status"
          fi

      - name: Collect sanitized gateway E2E diagnostics
        id: gateway_diagnostics
        if: failure() && steps.gateway_e2e.outcome == 'failure'
        continue-on-error: true
        timeout-minutes: 3
        shell: bash
        run: |
          set -euo pipefail
          raw_dir="$RUNNER_TEMP/n2api-diagnostics/gateway/raw"
          safe_dir="$RUNNER_TEMP/n2api-diagnostics/gateway/safe"
          dev/ci/collect-e2e-diagnostics.sh \
            "n2api-gateway-e2e-${{ github.run_id }}-${{ github.run_attempt }}" \
            gateway "$raw_dir" "$safe_dir"
          test -f "$safe_dir/safe.marker"
          echo "safe=true" >> "$GITHUB_OUTPUT"

      - name: Upload sanitized gateway E2E diagnostics
        if: always() && steps.gateway_diagnostics.outputs.safe == 'true'
        timeout-minutes: 3
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-diagnostics-gateway-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/n2api-diagnostics/gateway/safe
          if-no-files-found: error
          retention-days: 3
          include-hidden-files: false
          compression-level: 9

      - name: Stop PostgreSQL-backed gateway E2E
        if: always()
        timeout-minutes: 2
        env:
          E2E_PROJECT: n2api-gateway-e2e-${{ github.run_id }}-${{ github.run_attempt }}
        run: >-
          docker compose --project-name "$E2E_PROJECT"
          -f deploy/compose.e2e.yaml
          down --volumes --remove-orphans --rmi local --timeout 10

      - name: Run official OpenAI SDK contracts
        id: sdk_contracts
        env:
          CONTRACT_PROJECT: n2api-sdk-contracts-${{ github.run_id }}-${{ github.run_attempt }}
        shell: bash
        run: |
          set -euo pipefail
          make disk-check-heavy
          raw_dir="$RUNNER_TEMP/n2api-diagnostics/sdk-contracts/raw"
          mkdir -p "$raw_dir"
          if ! docker compose --project-name "$CONTRACT_PROJECT" \
            --profile contracts -f deploy/compose.e2e.yaml \
            build contracts-javascript contracts-python \
            >"$raw_dir/compose-build.log" 2>&1; then
            printf 'stage=compose_build failure=command_failed status=1\n' \
              >"$raw_dir/contracts-javascript.log"
            exit 1
          fi
          if ! docker compose --project-name "$CONTRACT_PROJECT" \
            -f deploy/compose.e2e.yaml \
            up -d --build --wait postgres mock-openai n2api \
            >"$raw_dir/compose-up.log" 2>&1; then
            printf 'stage=compose_start failure=command_failed status=1\n' \
              >"$raw_dir/contracts-javascript.log"
            exit 1
          fi

          javascript_status=0
          python_status=0
          docker compose --project-name "$CONTRACT_PROJECT" \
            --profile contracts -f deploy/compose.e2e.yaml \
            run --rm --no-deps \
            -e N2API_CONTRACT_PRESERVE_FAILURE_STATE=true \
            contracts-javascript \
            >"$raw_dir/contracts-javascript.log" 2>&1 || javascript_status=$?
          docker compose --project-name "$CONTRACT_PROJECT" \
            --profile contracts -f deploy/compose.e2e.yaml \
            run --rm --no-deps \
            -e N2API_CONTRACT_PRESERVE_FAILURE_STATE=true \
            contracts-python \
            >"$raw_dir/contracts-python.log" 2>&1 || python_status=$?

          if (( javascript_status != 0 )); then
            printf 'stage=javascript_contract failure=command_failed status=%d\n' \
              "$javascript_status" >>"$raw_dir/contracts-javascript.log"
          fi
          if (( python_status != 0 )); then
            printf 'stage=python_contract failure=command_failed status=%d\n' \
              "$python_status" >>"$raw_dir/contracts-python.log"
          fi

          printf 'javascript_status=%d\npython_status=%d\n' \
            "$javascript_status" "$python_status" >"$raw_dir/runner-status.txt"

          if (( javascript_status != 0 || python_status != 0 )); then
            exit 1
          fi

      - name: Collect sanitized SDK contract diagnostics
        id: sdk_diagnostics
        if: failure() && steps.sdk_contracts.outcome == 'failure'
        continue-on-error: true
        timeout-minutes: 3
        shell: bash
        run: |
          set -euo pipefail
          raw_dir="$RUNNER_TEMP/n2api-diagnostics/sdk-contracts/raw"
          safe_dir="$RUNNER_TEMP/n2api-diagnostics/sdk-contracts/safe"
          dev/ci/collect-e2e-diagnostics.sh \
            "n2api-sdk-contracts-${{ github.run_id }}-${{ github.run_attempt }}" \
            sdk-contracts "$raw_dir" "$safe_dir"
          test -f "$safe_dir/safe.marker"
          echo "safe=true" >> "$GITHUB_OUTPUT"

      - name: Upload sanitized SDK contract diagnostics
        if: always() && steps.sdk_diagnostics.outputs.safe == 'true'
        timeout-minutes: 3
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-diagnostics-sdk-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/n2api-diagnostics/sdk-contracts/safe
          if-no-files-found: error
          retention-days: 3
          include-hidden-files: false
          compression-level: 9

      - name: Stop official OpenAI SDK contracts
        if: always()
        timeout-minutes: 2
        env:
          CONTRACT_PROJECT: n2api-sdk-contracts-${{ github.run_id }}-${{ github.run_attempt }}
        run: >-
          docker compose --project-name "$CONTRACT_PROJECT"
          -f deploy/compose.e2e.yaml
          down --volumes --remove-orphans --rmi local --timeout 10

  image:
    name: Build and smoke test image (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: test
    env:
      N2API_TEST_RUN_ID: gha-image-${{ matrix.suffix }}-${{ github.run_id }}-${{ github.run_attempt }}
      LOCAL_IMAGE: n2api:ci-${{ matrix.suffix }}-${{ github.run_id }}-${{ github.run_attempt }}
      SMOKE_NETWORK: n2api-ci-${{ matrix.suffix }}-${{ github.run_id }}-${{ github.run_attempt }}
      SMOKE_POSTGRES: n2api-ci-postgres-${{ matrix.suffix }}-${{ github.run_id }}-${{ github.run_attempt }}
      SMOKE_APP: n2api-ci-${{ matrix.suffix }}-${{ github.run_id }}-${{ github.run_attempt }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
          - platform: linux/arm64
            suffix: arm64
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Set image coordinates
        shell: bash
        run: |
          set -euo pipefail
          commit_epoch="$(git show -s --format=%ct "$GITHUB_SHA")"
          if [[ ! "$commit_epoch" =~ ^[0-9]+$ ]]; then
            echo "Could not resolve commit timestamp for $GITHUB_SHA" >&2
            exit 1
          fi
          {
            echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}"
            echo "SHORT_SHA=${GITHUB_SHA:0:12}"
            echo "BUILD_VERSION=sha-${GITHUB_SHA:0:12}"
            echo "BUILD_TIME=$(date -u -d "@$commit_epoch" +'%Y-%m-%dT%H:%M:%SZ')"
            echo "SOURCE_URL=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          } >> "$GITHUB_ENV"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=raw,value=sha-${{ env.SHORT_SHA }}

      - name: Disk preflight for image build
        run: make disk-check-heavy

      - name: Build platform image once
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: deploy/Dockerfile
          platforms: ${{ matrix.platform }}
          load: true
          tags: ${{ env.LOCAL_IMAGE }}
          build-args: |
            N2API_VERSION=${{ env.BUILD_VERSION }}
            N2API_COMMIT=${{ github.sha }}
            N2API_BUILD_TIME=${{ env.BUILD_TIME }}
            N2API_SOURCE=${{ env.SOURCE_URL }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.source=${{ env.SOURCE_URL }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.BUILD_VERSION }}
            org.opencontainers.image.created=${{ env.BUILD_TIME }}
          cache-from: type=gha,scope=image-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=image-${{ matrix.suffix }}

      - name: Start PostgreSQL for smoke test
        shell: bash
        run: |
          set -euo pipefail
          make disk-check-heavy
          docker network create \
            --label io.knowsky.n2api.resource=test \
            --label "io.knowsky.n2api.run-id=${N2API_TEST_RUN_ID}" \
            "$SMOKE_NETWORK"
          docker run -d --name "$SMOKE_POSTGRES" \
            --label io.knowsky.n2api.resource=test \
            --label "io.knowsky.n2api.run-id=${N2API_TEST_RUN_ID}" \
            --network "$SMOKE_NETWORK" \
            -e POSTGRES_DB=n2api \
            -e POSTGRES_USER=n2api \
            -e POSTGRES_PASSWORD=ci-postgres-password \
            --health-cmd "pg_isready -U n2api -d n2api" \
            --health-interval 5s \
            --health-timeout 5s \
            --health-retries 10 \
            postgres:18.4-alpine3.23@sha256:996d0920e4ff9df1fc19dacb904492f3c1ec0ec1cc338f0ad7123be7731c5f5e
          for attempt in $(seq 1 30); do
            if [ "$(docker inspect -f '{{.State.Health.Status}}' "$SMOKE_POSTGRES")" = "healthy" ]; then
              exit 0
            fi
            if [ "$attempt" = "30" ]; then
              echo "PostgreSQL smoke dependency did not become healthy" >&2
              exit 1
            fi
            sleep 1
          done

      - name: Run image
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --name "$SMOKE_APP" \
            --label io.knowsky.n2api.resource=test \
            --label "io.knowsky.n2api.run-id=${N2API_TEST_RUN_ID}" \
            --platform "${{ matrix.platform }}" \
            --network "$SMOKE_NETWORK" \
            -e N2API_HOST=127.0.0.1 \
            -e N2API_PORT=3000 \
            -e N2API_PUBLIC_URL=http://127.0.0.1:3000 \
            -e N2API_ACCEPT_RISKS=database-plaintext \
            -e "DATABASE_URL=postgres://n2api:ci-postgres-password@${SMOKE_POSTGRES}:5432/n2api?sslmode=disable" \
            -e N2API_ADMIN_USERNAME=admin \
            -e N2API_ADMIN_PASSWORD=ci-admin-password \
            -e N2API_ENCRYPTION_SECRET=ci-encryption-secret-with-enough-length \
            -e OPENAI_API_BASE_URL=https://api.openai.com \
            "$LOCAL_IMAGE"

      - name: Smoke test image
        shell: bash
        run: |
          set -euo pipefail
          smoke_dir="$RUNNER_TEMP/n2api-image-smoke-${{ matrix.suffix }}-${{ github.run_id }}-${{ github.run_attempt }}"
          mkdir -p "$smoke_dir"
          for attempt in $(seq 1 30); do
            if docker exec "$SMOKE_APP" wget -qO /tmp/readiness.json http://127.0.0.1:3000/readyz; then
              break
            fi
            if [ "$attempt" = "30" ]; then
              echo "N2API image did not become ready" >&2
              exit 1
            fi
            sleep 1
          done
          docker cp "$SMOKE_APP:/tmp/readiness.json" "$smoke_dir/readiness.json"
          grep '"status":"ok"' "$smoke_dir/readiness.json"
          grep '"database":"ok"' "$smoke_dir/readiness.json"
          grep '"staticAssets":"ok"' "$smoke_dir/readiness.json"
          docker exec "$SMOKE_APP" wget -qO /tmp/liveness.json http://127.0.0.1:3000/livez
          docker cp "$SMOKE_APP:/tmp/liveness.json" "$smoke_dir/liveness.json"
          grep '"status":"ok"' "$smoke_dir/liveness.json"
          docker exec "$SMOKE_APP" wget -qO /tmp/version.json http://127.0.0.1:3000/version
          docker cp "$SMOKE_APP:/tmp/version.json" "$smoke_dir/version.json"
          grep "\"version\":\"${BUILD_VERSION}\"" "$smoke_dir/version.json"
          docker exec "$SMOKE_APP" wget -qO /tmp/bootstrap.json http://127.0.0.1:3000/api/admin/bootstrap
          docker cp "$SMOKE_APP:/tmp/bootstrap.json" "$smoke_dir/bootstrap.json"
          grep '"adminUsername":"admin"' "$smoke_dir/bootstrap.json"
          docker exec "$SMOKE_APP" wget -qO /tmp/index.html http://127.0.0.1:3000/
          docker cp "$SMOKE_APP:/tmp/index.html" "$smoke_dir/index.html"
          grep '<!doctype html>' "$smoke_dir/index.html"
          grep '/_app/immutable/entry/app' "$smoke_dir/index.html"
          test "$(docker exec "$SMOKE_APP" id -u)" = "10001"
          test "$(docker exec "$SMOKE_APP" id -g)" = "10001"
          test "$(docker exec "$SMOKE_APP" stat -c '%u:%g' /app/n2api)" = "0:10001"
          test "$(docker exec "$SMOKE_APP" stat -c '%u:%g' /app/frontend/build/200.html)" = "0:10001"
          docker exec "$SMOKE_APP" test ! -w /app/n2api
          docker exec "$SMOKE_APP" test ! -w /app/frontend/build/200.html
          docker exec "$SMOKE_APP" test -s /etc/ssl/certs/ca-certificates.crt
          docker exec "$SMOKE_APP" wget -qO /dev/null https://example.com
          docker exec "$SMOKE_APP" sh -eu -c '
            wget -S -O /tmp/login.json -o /tmp/login.headers \
              --header "Content-Type: application/json" \
              --post-data "{\"username\":\"admin\",\"password\":\"ci-admin-password\"}" \
              http://127.0.0.1:3000/api/admin/login
            cookie="$(sed -n "s/^[[:space:]]*Set-Cookie: \([^;]*\).*/\1/p" /tmp/login.headers | head -n 1)"
            test -n "$cookie"
            wget -qO /tmp/admin-health.json --header "Cookie: $cookie" \
              http://127.0.0.1:3000/api/admin/health
            rm /tmp/login.json /tmp/login.headers
          '
          docker cp "$SMOKE_APP:/tmp/admin-health.json" "$smoke_dir/admin-health.json"
          grep "\"version\":\"${BUILD_VERSION}\"" "$smoke_dir/admin-health.json"
          grep "\"commit\":\"${GITHUB_SHA}\"" "$smoke_dir/admin-health.json"
          grep "\"builtAt\":\"${BUILD_TIME}\"" "$smoke_dir/admin-health.json"
          test "$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.source"}}' "$LOCAL_IMAGE")" = "$SOURCE_URL"
          test "$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' "$LOCAL_IMAGE")" = "$GITHUB_SHA"
          test "$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.version"}}' "$LOCAL_IMAGE")" = "$BUILD_VERSION"
          test "$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.created"}}' "$LOCAL_IMAGE")" = "$BUILD_TIME"

      - name: Verify graceful shutdown
        shell: bash
        run: |
          set -euo pipefail
          SECONDS=0
          docker stop --timeout 10 "$SMOKE_APP"
          elapsed="$SECONDS"
          exit_code="$(docker inspect -f '{{.State.ExitCode}}' "$SMOKE_APP")"
          if (( elapsed > 10 )); then
            echo "N2API did not stop within ten seconds" >&2
            exit 1
          fi
          if [ "$exit_code" != "0" ]; then
            echo "N2API did not exit cleanly after SIGTERM" >&2
            exit 1
          fi

      - name: Stop smoke test containers
        if: always()
        timeout-minutes: 2
        shell: bash
        run: |
          docker rm -f "$SMOKE_APP" "$SMOKE_POSTGRES" || true
          docker network rm "$SMOKE_NETWORK" || true

      - name: Export tested platform image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          archive_dir="$RUNNER_TEMP/n2api-tested-image-${{ matrix.suffix }}"
          mkdir -p "$archive_dir"
          docker image inspect --format '{{.Id}}' "$LOCAL_IMAGE" \
            > "$archive_dir/config-digest"
          docker save "$LOCAL_IMAGE" | gzip -1 > "$archive_dir/image.tar.gz"
          sha256sum "$archive_dir/image.tar.gz" > "$archive_dir/image.tar.gz.sha256"

      - name: Upload tested platform image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tested-image-${{ matrix.suffix }}
          path: ${{ runner.temp }}/n2api-tested-image-${{ matrix.suffix }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

      - name: Remove local smoke image
        if: always()
        shell: bash
        run: |
          docker image rm "$LOCAL_IMAGE" || true
          if [ -n "${IMAGE_NAME:-}" ] && [ -n "${SHORT_SHA:-}" ]; then
            docker image rm "${REGISTRY}/${IMAGE_NAME}:sha-${SHORT_SHA}-${{ matrix.suffix }}" || true
          fi
          rm -rf -- "$RUNNER_TEMP/n2api-image-smoke-${{ matrix.suffix }}-${{ github.run_id }}-${{ github.run_attempt }}"

  publish-platform:
    name: Publish tested platform image (${{ matrix.platform }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: image
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
          - platform: linux/arm64
            suffix: arm64
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Set image coordinates
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}"
            echo "SHORT_SHA=${GITHUB_SHA:0:12}"
            echo "LOCAL_IMAGE=n2api:ci-${{ matrix.suffix }}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          } >> "$GITHUB_ENV"

      - name: Download tested platform image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: tested-image-${{ matrix.suffix }}
          path: ${{ runner.temp }}/n2api-tested-image-${{ matrix.suffix }}

      - name: Validate and load tested platform image
        shell: bash
        run: |
          set -euo pipefail
          archive_dir="$RUNNER_TEMP/n2api-tested-image-${{ matrix.suffix }}"
          cd "$archive_dir"
          sha256sum --check image.tar.gz.sha256
          expected_config_digest="$(tr -d '[:space:]' < config-digest)"
          if [[ ! "$expected_config_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid tested image config digest" >&2
            exit 1
          fi
          gzip -dc image.tar.gz | docker load
          actual_config_digest="$(docker image inspect --format '{{.Id}}' "$LOCAL_IMAGE")"
          if [ "$actual_config_digest" != "$expected_config_digest" ]; then
            echo "Downloaded image does not match the tested config digest" >&2
            exit 1
          fi
          echo "LOCAL_CONFIG_DIGEST=$actual_config_digest" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tested platform image
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}"
          platform_ref="${image}:sha-${SHORT_SHA}-${{ matrix.suffix }}"

          digest_for() {
            docker buildx imagetools inspect "$1" \
              | sed -n 's/^Digest:[[:space:]]*//p' \
              | head -n 1
          }

          if docker buildx imagetools inspect "$platform_ref" >/dev/null 2>&1; then
            echo "$platform_ref already exists; preserving its immutable digest"
          else
            docker tag "$LOCAL_IMAGE" "$platform_ref"
            docker push "$platform_ref"
          fi

          remote_config_digest="$(
            docker buildx imagetools inspect --raw "$platform_ref" \
              | jq -r '.config.digest // empty'
          )"
          if [ "$remote_config_digest" != "$LOCAL_CONFIG_DIGEST" ]; then
            echo "$platform_ref does not match the image that passed the smoke test" >&2
            exit 1
          fi

          platform_digest="$(digest_for "$platform_ref")"
          if [[ ! "$platform_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Could not resolve the pushed manifest digest for $platform_ref" >&2
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/n2api-digests"
          printf '%s\n' "$platform_digest" > "$RUNNER_TEMP/n2api-digests/${{ matrix.suffix }}"

      - name: Upload platform digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-digest-${{ matrix.suffix }}
          path: ${{ runner.temp }}/n2api-digests/${{ matrix.suffix }}
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Publish multi-platform image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: publish-platform
    outputs:
      image: ${{ steps.publish.outputs.image }}
      digest: ${{ steps.publish.outputs.digest }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Set image coordinates
        shell: bash
        run: |
          set -euo pipefail
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${GITHUB_SHA:0:12}" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download platform digests
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: image-digest-*
          path: ${{ runner.temp }}/n2api-digests
          merge-multiple: true

      - name: Publish tested multi-platform image
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}"
          sha_ref="${image}:sha-${SHORT_SHA}"
          main_ref="${image}:main"
          refs=()
          expected_digests=()

          for suffix in amd64 arm64; do
            digest_file="$RUNNER_TEMP/n2api-digests/${suffix}"
            if [ ! -f "$digest_file" ]; then
              echo "Missing platform digest artifact: $suffix" >&2
              exit 1
            fi
            digest="$(tr -d '[:space:]' < "$digest_file")"
            if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Invalid platform digest for $suffix: $digest" >&2
              exit 1
            fi
            refs+=("${image}@${digest}")
            expected_digests+=("$digest")
          done

          digest_for() {
            docker buildx imagetools inspect "$1" \
              | sed -n 's/^Digest:[[:space:]]*//p' \
              | head -n 1
          }

          validate_manifest() {
            local ref="$1"
            local raw actual_platforms actual_digests expected
            raw="$(docker buildx imagetools inspect --raw "$ref")"
            actual_platforms="$(
              jq -r '.manifests[] | "\(.platform.os)/\(.platform.architecture)"' <<< "$raw" \
                | sort
            )"
            if [ "$actual_platforms" != $'linux/amd64\nlinux/arm64' ]; then
              echo "$ref has unexpected platforms:" >&2
              printf '%s\n' "$actual_platforms" >&2
              exit 1
            fi
            actual_digests="$(jq -r '.manifests[].digest' <<< "$raw" | sort)"
            expected="$(printf '%s\n' "${expected_digests[@]}" | sort)"
            if [ "$actual_digests" != "$expected" ]; then
              echo "$ref does not contain the tested platform digests" >&2
              exit 1
            fi
          }

          if docker buildx imagetools inspect "$sha_ref" >/dev/null 2>&1; then
            echo "$sha_ref already exists; preserving its immutable digest"
            validate_manifest "$sha_ref"
          else
            docker buildx imagetools create --tag "$sha_ref" "${refs[@]}"
            validate_manifest "$sha_ref"
          fi

          sha_digest="$(digest_for "$sha_ref")"
          if [[ ! "$sha_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Could not resolve the multi-platform digest for $sha_ref" >&2
            exit 1
          fi

          latest_main_sha="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
          if [[ ! "$latest_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Could not resolve the current origin/main commit" >&2
            exit 1
          fi
          if [ "$latest_main_sha" = "$GITHUB_SHA" ]; then
            docker buildx imagetools create \
              --tag "$main_ref" \
              "${image}@${sha_digest}"
            main_digest="$(digest_for "$main_ref")"
            if [ "$main_digest" != "$sha_digest" ]; then
              echo "main and sha tags resolved to different digests" >&2
              exit 1
            fi
            validate_manifest "$main_ref"
          else
            echo "A newer main commit exists; leaving the main tag unchanged"
          fi

          echo "digest=$sha_digest" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Attest pushed image
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ steps.publish.outputs.image }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true

  image-evidence:
    name: Image evidence (${{ matrix.platform }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: manifest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
          - platform: linux/arm64
            suffix: arm64
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: backend/go.mod
          cache: false

      - name: Prepare evidence paths
        shell: bash
        run: |
          set -euo pipefail
          evidence_dir="$RUNNER_TEMP/n2api-image-evidence/${{ matrix.suffix }}"
          mkdir -p "$evidence_dir"
          {
            echo "EVIDENCE_DIR=$evidence_dir"
            echo "SBOM_FILE=$evidence_dir/n2api-sbom-${{ matrix.suffix }}.spdx.json"
            echo "TRIVY_FILE=$evidence_dir/n2api-trivy-${{ matrix.suffix }}.json"
            echo "METADATA_FILE=$evidence_dir/n2api-evidence-${{ matrix.suffix }}.json"
          } >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate platform SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        env:
          SYFT_PLATFORM: ${{ matrix.platform }}
        with:
          image: ${{ needs.manifest.outputs.image }}@${{ needs.manifest.outputs.digest }}
          format: spdx-json
          output-file: ${{ env.SBOM_FILE }}
          upload-artifact: false
          dependency-snapshot: false
          upload-release-assets: false

      - name: Validate platform SPDX SBOM
        shell: bash
        run: |
          set -euo pipefail
          test -s "$SBOM_FILE"
          jq -e '
            type == "object" and
            (.spdxVersion | type == "string") and
            (.SPDXID | type == "string") and
            (.packages | type == "array")
          ' "$SBOM_FILE" >/dev/null

      - name: Attest platform SPDX SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ needs.manifest.outputs.image }}
          subject-digest: ${{ needs.manifest.outputs.digest }}
          sbom-path: ${{ env.SBOM_FILE }}
          push-to-registry: true
          show-summary: false

      - name: Scan platform image vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_PLATFORM: ${{ matrix.platform }}
        with:
          image-ref: ${{ needs.manifest.outputs.image }}@${{ needs.manifest.outputs.digest }}
          scanners: vuln
          format: json
          output: ${{ env.TRIVY_FILE }}
          exit-code: '0'
          ignore-unfixed: false
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

      - name: Validate and summarize platform evidence
        env:
          PARENT_DIGEST: ${{ needs.manifest.outputs.digest }}
          PLATFORM: ${{ matrix.platform }}
        shell: bash
        run: |
          set -euo pipefail
          test -s "$TRIVY_FILE"
          jq -e '
            type == "object" and
            (.SchemaVersion == 2) and
            (.ArtifactName | type == "string") and
            (.Results | type == "array") and
            ([.Results[]? | (.Vulnerabilities // [])] | all(.[]; type == "array"))
          ' "$TRIVY_FILE" >/dev/null

          sbom_name="${SBOM_FILE##*/}"
          trivy_name="${TRIVY_FILE##*/}"
          jq -n \
            --arg parentDigest "$PARENT_DIGEST" \
            --arg platform "$PLATFORM" \
            --arg sbom "$sbom_name" \
            --arg vulnerabilityReport "$trivy_name" \
            '{
              parentDigest: $parentDigest,
              platform: $platform,
              files: {
                sbom: $sbom,
                vulnerabilityReport: $vulnerabilityReport
              }
            }' > "$METADATA_FILE"
          jq -e \
            --arg digest "$PARENT_DIGEST" \
            --arg platform "$PLATFORM" \
            --arg sbom "$sbom_name" \
            --arg trivy "$trivy_name" \
            '.parentDigest == $digest and
             .platform == $platform and
             .files.sbom == $sbom and
             .files.vulnerabilityReport == $trivy' \
            "$METADATA_FILE" >/dev/null

          {
            printf '### Image vulnerability evidence (%s)\n\n' "$PLATFORM"
            printf '| Severity | Findings |\n'
            printf '| --- | ---: |\n'
            for severity in UNKNOWN LOW MEDIUM HIGH CRITICAL; do
              count="$(
                jq --arg severity "$severity" \
                  '[.Results[]?.Vulnerabilities[]? | select((.Severity // "UNKNOWN") == $severity)] | length' \
                  "$TRIVY_FILE"
              )"
              printf '| %s | %s |\n' "$severity" "$count"
            done
            printf '\nPolicy: unexcepted HIGH/CRITICAL findings with a non-empty fixed version block this job.\n'
            printf 'Unfixed findings remain report-only. Scanner, schema, registry, and report-generation errors fail closed.\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload platform image evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: image-evidence-${{ matrix.suffix }}
          path: |
            ${{ env.SBOM_FILE }}
            ${{ env.TRIVY_FILE }}
            ${{ env.METADATA_FILE }}
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: false

      - name: Enforce fixed vulnerability policy
        env:
          PLATFORM: ${{ matrix.platform }}
        run: dev/ci/evaluate-trivy-report.sh "$TRIVY_FILE" "$PLATFORM" security/exceptions.json
