name: Security

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
    types:
      - checks_requested
  schedule:
    - cron: "17 3 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exceptions:
    name: Security exception policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Validate expiring security exceptions
        run: go run dev/ci/validate-security-exceptions.go security/exceptions.json

      - name: Test security exception validator
        run: |
          go test dev/ci/validate-security-exceptions.go dev/ci/validate-security-exceptions_test.go
          dev/ci/test-security-policy.sh

      - name: Validate issue forms
        working-directory: backend
        run: |
          go test ./cmd/validate-issue-forms
          go run ./cmd/validate-issue-forms ../.github/ISSUE_TEMPLATE

      - name: Install actionlint
        env:
          GOBIN: ${{ runner.temp }}/n2api-security-bin
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Validate GitHub Actions workflows
        run: |
          $RUNNER_TEMP/n2api-security-bin/actionlint
          bash dev/ci/verify-pinned-dependencies.sh

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    needs: exceptions
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Render CodeQL exception filters
        run: dev/ci/render-codeql-config.sh security/exceptions.json .github/codeql/n2api-security.yml

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c54b30b7df092240050e69945842bc67aee0f0f4 # v4.37.3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/n2api-security.yml

      - name: Autobuild Go
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@c54b30b7df092240050e69945842bc67aee0f0f4 # v4.37.3

      - name: Analyze
        uses: github/codeql-action/analyze@c54b30b7df092240050e69945842bc67aee0f0f4 # v4.37.3
        with:
          category: /language:${{ matrix.language }}

  dependencies:
    name: Dependency vulnerabilities
    runs-on: ubuntu-latest
    needs: exceptions
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install govulncheck
        env:
          GOBIN: ${{ runner.temp }}/n2api-security-bin
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0

      - name: Scan reachable Go vulnerabilities
        working-directory: backend
        run: $RUNNER_TEMP/n2api-security-bin/govulncheck -json ./... > "$RUNNER_TEMP/govulncheck.json"

      - name: Enforce reachable Go vulnerability policy
        run: dev/ci/evaluate-govulncheck-report.sh "$RUNNER_TEMP/govulncheck.json" security/exceptions.json

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Audit frontend dependencies
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t identifiers < <(
            go run ../dev/ci/validate-security-exceptions.go \
              --active-identifiers bun-audit source ../security/exceptions.json
          )
          args=(--audit-level=high)
          for identifier in "${identifiers[@]}"; do
            if [[ "$identifier" != cve:* ]]; then
              echo "bun audit exception has an unsupported identity type" >&2
              exit 1
            fi
            args+=(--ignore="${identifier#cve:}")
          done
          bun audit "${args[@]}"
