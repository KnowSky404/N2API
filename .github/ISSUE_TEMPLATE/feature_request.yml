name: Feature request
description: Propose a scoped improvement for the personal self-hosted gateway
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        N2API V1 is a personal, self-hosted AI API/account gateway. It does not include public registration, multi-tenant platform behavior, billing, recharge, payments, or merchant accounting.

        Report vulnerabilities through [private vulnerability reporting](https://github.com/KnowSky404/N2API/security/advisories/new), not this form. Do not include secrets, cookies, callback codes or URLs, dumps, production records, or complete request/response bodies.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the concrete personal self-hosted workflow that is difficult today.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe externally observable behavior and the smallest useful scope.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Primary area
      options:
        - Gateway compatibility
        - Provider accounts and routing
        - Admin operations
        - Deployment and recovery
        - Security and repository governance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note current workarounds and why they are insufficient.

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and operational impact
      description: Note migration, configuration, Docker, security, or rollback implications if known.

  - type: checkboxes
    id: confirmations
    attributes:
      label: Submission checks
      options:
        - label: I understand the personal self-hosted V1 scope described above.
          required: true
        - label: This request contains no secret, cookie, callback code or URL, database dump, production data, or complete request/response body.
          required: true
        - label: I searched existing issues and plans for the same request.
          required: true
