services:
  n2api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m,mode=1777,uid=10001,gid=10001
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 10s
    env_file:
      - path: ../.env.example
      - path: ../.env
        required: false
    environment:
      N2API_ACCEPT_RISKS: ${N2API_ACCEPT_RISKS:-public-http,public-bind,database-plaintext}
      N2API_ADMIN_PASSWORD: ${N2API_ADMIN_PASSWORD:-n2api-local-admin-password}
      N2API_ENCRYPTION_SECRET: ${N2API_ENCRYPTION_SECRET:-n2api-local-encryption-secret-at-least-32-bytes}
      N2API_ENCRYPTION_KEY_ID: ${N2API_ENCRYPTION_KEY_ID:-default}
      N2API_ENCRYPTION_PREVIOUS_KEYS: ${N2API_ENCRYPTION_PREVIOUS_KEYS:-[]}
      DATABASE_URL: ${DATABASE_URL:-postgres://n2api:n2api-local-postgres-password@postgres:5432/n2api?sslmode=disable}
    ports:
      - "${N2API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:18.4-alpine3.23@sha256:996d0920e4ff9df1fc19dacb904492f3c1ec0ec1cc338f0ad7123be7731c5f5e
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n2api}
      POSTGRES_USER: ${POSTGRES_USER:-n2api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n2api-local-postgres-password}
    volumes:
      - n2api-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n2api} -d ${POSTGRES_DB:-n2api}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-backup:
    image: postgres:18.4-alpine3.23@sha256:996d0920e4ff9df1fc19dacb904492f3c1ec0ec1cc338f0ad7123be7731c5f5e
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/n2api-postgres-backup"]
    command: ["daemon"]
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-n2api}
      PGUSER: ${POSTGRES_USER:-n2api}
      PGPASSWORD: ${POSTGRES_PASSWORD:-n2api-local-postgres-password}
      N2API_BACKUP_INTERVAL_SECONDS: ${N2API_BACKUP_INTERVAL_SECONDS:-21600}
      N2API_BACKUP_RETENTION_DAYS: ${N2API_BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./postgres-backup.sh:/usr/local/bin/n2api-postgres-backup:ro
      - ../backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=4m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "/usr/local/bin/n2api-postgres-backup", "healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

volumes:
  n2api-postgres:
