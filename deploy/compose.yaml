services:
  n2api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - path: ../.env.example
      - path: ../.env
        required: false
    ports:
      - "${N2API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n2api}
      POSTGRES_USER: ${POSTGRES_USER:-n2api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - n2api-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n2api} -d ${POSTGRES_DB:-n2api}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  n2api-postgres:
