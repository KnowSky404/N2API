services:
  n2api:
    image: ${N2API_IMAGE:?N2API_IMAGE must be set to an immutable CalVer tag or digest}
    pull_policy: always
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m,mode=1777,uid=10001,gid=10001
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 10s
    env_file:
      - path: ../.env
        required: true
    environment:
      N2API_HOST: ${N2API_HOST:-0.0.0.0}
      N2API_PUBLIC_URL: ${N2API_PUBLIC_URL:?N2API_PUBLIC_URL is required}
      N2API_ACCEPT_RISKS: ${N2API_ACCEPT_RISKS:?N2API_ACCEPT_RISKS is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      N2API_ADMIN_PASSWORD: ${N2API_ADMIN_PASSWORD:?N2API_ADMIN_PASSWORD is required}
      N2API_ENCRYPTION_SECRET: ${N2API_ENCRYPTION_SECRET:?N2API_ENCRYPTION_SECRET is required}
    ports:
      - name: http
        target: 3000
        published: "${N2API_PORT:-3000}"
        host_ip: "${N2API_BIND_ADDRESS:-127.0.0.1}"
        protocol: tcp
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:18.4-alpine3.23@sha256:996d0920e4ff9df1fc19dacb904492f3c1ec0ec1cc338f0ad7123be7731c5f5e
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n2api}
      POSTGRES_USER: ${POSTGRES_USER:-n2api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - n2api-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n2api} -d ${POSTGRES_DB:-n2api}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  n2api-postgres:
