name: n2api-e2e

x-test-labels: &test-labels
  io.knowsky.n2api.resource: test
  io.knowsky.n2api.run-id: ${N2API_TEST_RUN_ID:?set N2API_TEST_RUN_ID}

services:
  mock-openai:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.e2e
      target: mock-openai
      labels: *test-labels
    labels: *test-labels
    environment:
      N2API_MOCK_ADDR: :8080
      N2API_MOCK_API_KEY: e2e-upstream-fixture-key
    expose:
      - "8080"
    networks:
      - e2e
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8080/healthz"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 2s

  postgres:
    image: postgres:18.4-alpine3.23@sha256:996d0920e4ff9df1fc19dacb904492f3c1ec0ec1cc338f0ad7123be7731c5f5e
    labels: *test-labels
    environment:
      POSTGRES_DB: n2api_e2e
      POSTGRES_USER: n2api
      POSTGRES_PASSWORD: e2e-postgres-password
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - e2e
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n2api -d n2api_e2e"]
      interval: 2s
      timeout: 2s
      retries: 15

  n2api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      labels: *test-labels
    labels: *test-labels
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m,mode=1777,uid=10001,gid=10001
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 10s
    environment:
      N2API_HOST: 0.0.0.0
      N2API_PORT: 3000
      N2API_PUBLIC_URL: http://n2api:3000
      N2API_ACCEPT_RISKS: public-http,public-bind,database-plaintext
      N2API_ADMIN_USERNAME: admin
      N2API_ADMIN_PASSWORD: e2e-admin-password
      N2API_ENCRYPTION_SECRET: e2e-encryption-secret-with-enough-length
      N2API_ALLOW_HTTP_API_UPSTREAMS: "true"
      N2API_PROVIDER_ACCOUNT_AUTO_TEST_ENABLED: "false"
      N2API_SYSTEM_EVENT_RETENTION_DAYS: 0
      DATABASE_URL: postgres://n2api:e2e-postgres-password@postgres:5432/n2api_e2e?sslmode=disable
    expose:
      - "3000"
    networks:
      - e2e
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/readyz"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 2s

  gateway-e2e:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.e2e
      target: gateway-e2e
      labels: *test-labels
    labels: *test-labels
    environment:
      N2API_E2E_BASE_URL: http://n2api:3000
      N2API_E2E_DATABASE_URL: postgres://n2api:e2e-postgres-password@postgres:5432/n2api_e2e?sslmode=disable
      N2API_E2E_ADMIN_USERNAME: admin
      N2API_E2E_ADMIN_PASSWORD: e2e-admin-password
      N2API_E2E_MOCK_BASE_URL: http://mock-openai:8080
      N2API_E2E_MOCK_API_KEY: e2e-upstream-fixture-key
    networks:
      - e2e
    depends_on:
      mock-openai:
        condition: service_healthy
      postgres:
        condition: service_healthy
      n2api:
        condition: service_healthy
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  contracts-javascript:
    profiles:
      - contracts
    build:
      context: ..
      dockerfile: deploy/Dockerfile.e2e
      target: contracts-javascript
      labels: *test-labels
    labels: *test-labels
    environment: &contract-environment
      N2API_CONTRACT_BASE_URL: http://n2api:3000/v1
      N2API_CONTRACT_ADMIN_BASE_URL: http://n2api:3000
      N2API_CONTRACT_ADMIN_USERNAME: admin
      N2API_CONTRACT_ADMIN_PASSWORD: e2e-admin-password
      N2API_CONTRACT_MOCK_BASE_URL: http://mock-openai:8080
      N2API_CONTRACT_MOCK_API_KEY: e2e-upstream-fixture-key
    networks:
      - e2e
    depends_on: &contract-dependencies
      mock-openai:
        condition: service_healthy
      n2api:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  contracts-python:
    profiles:
      - contracts
    build:
      context: ..
      dockerfile: deploy/Dockerfile.e2e
      target: contracts-python
      labels: *test-labels
    labels: *test-labels
    environment: *contract-environment
    networks:
      - e2e
    depends_on: *contract-dependencies
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  e2e:
    internal: true
    labels: *test-labels

volumes:
  postgres-data:
    labels: *test-labels
